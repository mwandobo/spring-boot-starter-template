spring.rabbitmq.password=guest

app.mail.send-via-queue=false

# RabbitMQ listener retry configuration
spring.rabbitmq.listener.simple.retry.enabled=true

# Total attempts = original delivery + 5 retries
spring.rabbitmq.listener.simple.retry.max-attempts=6

# First retry delay
spring.rabbitmq.listener.simple.retry.initial-interval=2s

# Backoff multiplier (exponential: 2s ? 4s ? 8s ? 16s ? 32s)
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Maximum delay between retries
spring.rabbitmq.listener.simple.retry.max-interval=30s

# Critical: after max attempts, do NOT requeue ? send to DLQ instead
spring.rabbitmq.listener.simple.default-requeue-rejected=false